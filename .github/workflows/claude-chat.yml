name: 💬 Claude Chat (Issue 对话)

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

# 防止同一条 Issue 同时触发多次运行
concurrency:
  group: claude-chat-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  chat:
    # 首次对话：打上 claude 标签时触发
    # 后续对话：用户在已有 claude 标签的 Issue 中回复时触发（排除 bot 自己的回复）
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'claude') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Build conversation context from Issue
        id: context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          node << 'NODE_SCRIPT'
          const fs = require("fs");
          const { execSync } = require("child_process");

          const repo = process.env.REPO;
          const issueNum = process.env.ISSUE_NUMBER;

          // 获取 Issue 详情
          const issue = JSON.parse(
            execSync(`gh api /repos/${repo}/issues/${issueNum}`, { encoding: "utf8" })
          );

          const parts = [];

          // 系统角色设定
          parts.push("# 系统指令");
          parts.push("你是 Claude Code AI 助手，运行在 GitHub Actions CI 环境中。");
          parts.push("你正在通过 GitHub Issue 与用户进行异步对话。");
          parts.push("你有权读取当前仓库的代码，可以回答代码问题、审查代码、生成代码等。");
          parts.push("你不能 push 代码、不能访问互联网、不能运行长时间任务。");
          parts.push("");
          parts.push("## 回复要求");
          parts.push("- 使用中文回复");
          parts.push("- 保持简洁有重点");
          parts.push("- 涉及代码时使用 Markdown 三重反引号 (```) 包裹");
          parts.push("- 如果用户问的是代码问题，引用具体的文件路径和行号");
          parts.push("");

          // Issue 标题作为对话主题
          parts.push("# 对话主题");
          parts.push(issue.title);
          parts.push("");

          // Issue 正文是第一条消息
          parts.push("## 用户的初始消息");
          parts.push(issue.body || "(无正文)");
          parts.push("");

          // 获取所有评论作为后续对话
          try {
            const raw = execSync(
              `gh api /repos/${repo}/issues/${issueNum}/comments --paginate`,
              { encoding: "utf8" }
            );
            const comments = JSON.parse(raw);
            if (comments.length > 0) {
              parts.push("## 后续对话（从旧到新）");
              parts.push("");
              comments.reverse().forEach((c) => {
                const role =
                  c.user.type === "Bot" ? "🤖 Claude (你)" : "👤 用户";
                parts.push(`--- **${role}** ---`);
                parts.push(c.body);
                parts.push("");
              });
            }
          } catch (e) {
            // 没有评论或获取失败则跳过
          }

          // 最终指令
          parts.push("---");
          parts.push("根据上面的完整对话历史，回复用户的**最新一条消息**。");

          fs.writeFileSync("/tmp/context.md", parts.join("\n"), "utf8");
          console.log(
            "✅ 上下文已构建: " +
              fs.statSync("/tmp/context.md").size +
              " bytes"
          );
          NODE_SCRIPT

      - name: 🤖 Run Claude
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NO_COLOR: "1"
          TERM: dumb
        shell: bash
        run: |
          claude --print -p "$(cat /tmp/context.md)" 2>/dev/null > /tmp/response.md || {
            echo "❌ Claude 执行失败"
            exit 1
          }
          if [ ! -s /tmp/response.md ]; then
            echo "❌ Claude 返回空响应"
            exit 1
          fi
          echo "✅ Claude 响应大小: $(wc -c < /tmp/response.md) bytes"

      - name: 📝 Post response to Issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/response.md', 'utf8').trim();
            if (!body) {
              console.error('❌ 响应内容为空');
              process.exit(1);
            }
            const { execSync } = require('child_process');
            execSync(
              'gh api /repos/' + process.env.REPO + '/issues/' + process.env.ISSUE_NUM + '/comments --input -',
              { input: JSON.stringify({body}), stdio: ['pipe', 'inherit', 'inherit'] }
            );
            console.log('✅ 回复已发布');
          "

      - name: 🏷️ Mark as responded
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
            -X POST \
            -f labels='["claude-responded"]' 2>/dev/null || true
