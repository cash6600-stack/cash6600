name: 🤖 Claude Code (一键任务)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: '输入你的 prompt / 问题'
        required: true
        type: string
      system_prompt:
        description: '系统提示词（可选，例如设定角色）'
        required: false
        type: string
        default: '你是 Claude Code AI 助手，运行在 GitHub Actions CI 中。使用中文回复，简洁有重点。'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: 🤖 Run Claude
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NO_COLOR: "1"
          TERM: dumb
        shell: bash
        run: |
          echo "📝 Prompt: ${{ github.event.inputs.prompt }}"
          echo ""
          echo "────────────────────────────────────────"
          echo "🤖 Claude 回应:"
          echo ""

          claude --print -p "${{ github.event.inputs.prompt }}" -s "${{ github.event.inputs.system_prompt }}" \
            2>/dev/null > /tmp/response.txt || {
            echo "❌ Claude 执行失败"
            exit 1
          }

          cat /tmp/response.txt
          echo ""
          echo "────────────────────────────────────────"
          echo "✅ 完成"

      - name: 📎 Upload response as artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-response
          path: /tmp/response.txt
